<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C 盘清理</title>
<style>
  :root {
    --bg: #eef1f5;
    --surface: #ffffff;
    --surface-2: #f6f8fa;
    --line: #e4e8ee;
    --line-strong: #d3d9e0;
    --text: #1c2530;
    --dim: #616d7a;
    --faint: #9aa4b0;
    --accent: #0d9c78;
    --accent-strong: #0b8367;
    --accent-soft: #dff3ec;
    --danger: #d1493c;
    --warn-bg: #fff4e0;
    --warn-fg: #9a5a12;
    --font: "Segoe UI Variable", "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 13.5px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: var(--font); cursor: pointer; }
  button:disabled { cursor: default; }

  /* ── 自定义标题栏 ───────────────────── */
  .titlebar {
    height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  .tb-drag {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 0 14px;
  }
  .tb-logo {
    width: 18px; height: 18px;
    border-radius: 5px;
    background: var(--accent);
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
  }
  .tb-title { font-size: 12.5px; font-weight: 600; letter-spacing: .3px; }
  .tb-controls { display: flex; }
  .win-btn {
    width: 44px;
    border: none;
    background: transparent;
    color: var(--dim);
    font-size: 13px;
    display: grid;
    place-items: center;
    transition: background .12s, color .12s;
  }
  .win-btn:hover { background: var(--surface-2); }
  .win-btn.close:hover { background: var(--danger); color: #fff; }

  /* ── C 盘容量卡片 ─────────────────────── */
  .disk {
    flex-shrink: 0;
    margin: 16px 22px 0;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .disk-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 9px; }
  .disk-name { font-size: 13px; font-weight: 600; }
  .disk-cap { font-size: 12px; color: var(--dim); font-variant-numeric: tabular-nums; }
  .disk-bar {
    height: 9px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .disk-fill {
    height: 100%;
    width: 0;
    border-radius: 6px 0 0 6px;
    background: linear-gradient(90deg, #3fb98f, var(--accent));
    transition: width .6s cubic-bezier(.2,.8,.2,1), background .3s;
  }
  .disk-fill.warn { background: linear-gradient(90deg, #e9a13b, #dd7b2f); }
  .disk-fill.crit { background: linear-gradient(90deg, #e5705f, var(--danger)); }
  .disk-legend { font-size: 11.5px; color: var(--faint); margin-top: 7px; font-variant-numeric: tabular-nums; }

  /* ── 分组标题 ─────────────────────────── */
  .group-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 12px 6px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--dim);
    letter-spacing: .3px;
  }
  .group-head::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .group-head .tag {
    font-size: 10px;
    font-weight: 500;
    color: var(--warn-fg);
    background: var(--warn-bg);
    padding: 1px 7px;
    border-radius: 10px;
  }

  /* ── 顶部：可清理总量 + 操作 ──────────── */
  .hero {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 22px 18px;
    gap: 18px;
  }
  .total .label {
    font-size: 12px;
    color: var(--dim);
    display: block;
    margin-bottom: 3px;
  }
  .total .num {
    font-size: 40px;
    font-weight: 650;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }
  .total .num .u { font-size: 20px; font-weight: 600; color: var(--dim); margin-left: 4px; }
  .total .sub { font-size: 12px; color: var(--faint); margin-top: 6px; }
  .actions { display: flex; gap: 10px; flex-shrink: 0; }
  .btn {
    font-size: 13.5px;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--text);
    transition: background .12s, border-color .12s, transform .05s, box-shadow .12s;
  }
  .btn:hover:not(:disabled) { background: var(--surface-2); border-color: var(--faint); }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(13, 156, 120, .28);
  }
  .btn.primary:hover:not(:disabled) { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn:disabled { opacity: .5; box-shadow: none; }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── 管理员提示条 ─────────────────────── */
  .notice {
    display: none;
    align-items: center;
    gap: 8px;
    margin: 0 22px 12px;
    padding: 8px 12px;
    background: var(--warn-bg);
    color: var(--warn-fg);
    border-radius: 8px;
    font-size: 12px;
  }
  .notice.show { display: flex; }

  /* ── 列表 ─────────────────────────────── */
  .list-head {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 22px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--line);
  }
  .list-head label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); cursor: pointer; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 14px;
  }
  main::-webkit-scrollbar { width: 10px; }
  main::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 5px; border: 3px solid var(--bg); }

  .item { animation: rise .3s ease-out backwards; }
  @keyframes rise { from { opacity: 0; transform: translateY(5px); } }
  .row {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 12px;
    border-radius: 10px;
  }
  .row:hover { background: var(--surface); }

  /* 展开箭头 */
  .chevron {
    width: 20px; height: 20px;
    border: none; background: transparent;
    color: var(--faint); cursor: pointer;
    display: grid; place-items: center;
    font-size: 9px; flex-shrink: 0;
    border-radius: 5px;
    transition: transform .15s, color .12s, background .12s;
  }
  .chevron:hover { color: var(--dim); background: var(--surface-2); }
  .chevron.open { transform: rotate(90deg); }
  .chevron-sp { width: 20px; flex-shrink: 0; }

  /* 安全等级徽标 */
  .lvl { font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 10px; margin-left: 8px; vertical-align: 1px; white-space: nowrap; }
  .lvl.safe { color: #0b8367; background: #dff3ec; }
  .lvl.redl { color: #1f6fb2; background: #e4eefb; }
  .lvl.caution { color: var(--warn-fg); background: var(--warn-bg); }

  /* 展开后的子路径列表 */
  .sub { margin: 2px 0 8px 48px; padding-left: 8px; border-left: 2px solid var(--line); }
  .subrow {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px; border-radius: 7px; cursor: pointer;
    font-size: 12px;
  }
  .subrow:hover { background: var(--surface-2); }
  .subpath {
    flex: 1; min-width: 0;
    font-family: Consolas, "Cascadia Mono", monospace;
    color: var(--dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .subsize { font-variant-numeric: tabular-nums; color: var(--text); flex-shrink: 0; }
  .subempty { padding: 6px 10px; font-size: 12px; color: var(--faint); }

  input[type="checkbox"] {
    appearance: none;
    width: 17px; height: 17px;
    border: 1.5px solid var(--line-strong);
    border-radius: 5px;
    background: var(--surface);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: background .12s, border-color .12s;
  }
  input[type="checkbox"]:hover { border-color: var(--accent); }
  input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  input[type="checkbox"]:checked::after {
    content: "";
    position: absolute;
    left: 5px; top: 1.5px;
    width: 4px; height: 8px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  input[type="checkbox"]:indeterminate { background: var(--accent); border-color: var(--accent); }
  input[type="checkbox"]:indeterminate::after {
    content: "";
    position: absolute;
    left: 3px; top: 6.5px;
    width: 9px; height: 2px;
    background: #fff;
    border-radius: 1px;
  }
  input[type="checkbox"]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    background: var(--accent-soft);
    color: var(--accent-strong);
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .icon svg { width: 20px; height: 20px; }

  .info { flex: 1; min-width: 0; }
  .name { font-size: 13.5px; font-weight: 500; }
  .desc { font-size: 12px; color: var(--dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .size {
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 92px;
    text-align: right;
    flex-shrink: 0;
  }
  .size.zero { color: var(--faint); font-weight: 500; }
  .size .freed {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 1px;
  }
  .size .err { display: block; font-size: 11px; font-weight: 500; color: var(--warn-fg); margin-top: 1px; }

  .row.scanning .size, .row.cleaning .size { color: var(--accent); animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: .4; } }

  /* ── 底部状态栏 ───────────────────────── */
  footer {
    flex-shrink: 0;
    font-size: 12px;
    color: var(--dim);
    padding: 9px 22px;
    border-top: 1px solid var(--line);
    background: var(--surface);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── 确认弹窗 ─────────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(28, 37, 48, .35);
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .overlay.show { display: flex; }
  .dialog {
    width: 380px;
    background: var(--surface);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 16px 48px rgba(28, 37, 48, .28);
    animation: pop .18s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: scale(.96); } }
  .dialog h2 { font-size: 16px; margin-bottom: 8px; }
  .dialog p { font-size: 13px; color: var(--dim); line-height: 1.6; }
  .dialog .big {
    font-size: 28px;
    font-weight: 650;
    color: var(--accent-strong);
    margin: 12px 0;
    font-variant-numeric: tabular-nums;
  }
  .dialog .btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
</style>
</head>
<body>
  <div class="titlebar">
    <div class="tb-drag" data-tauri-drag-region>
      <span class="tb-logo">C</span>
      <span class="tb-title">C 盘清理</span>
    </div>
    <div class="tb-controls">
      <button class="win-btn" id="btnMin" title="最小化" aria-label="最小化">&#8211;</button>
      <button class="win-btn close" id="btnClose" title="关闭" aria-label="关闭">&#10005;</button>
    </div>
  </div>

  <section class="disk" id="diskCard">
    <div class="disk-top">
      <span class="disk-name">本地磁盘 (C:)</span>
      <span class="disk-cap" id="diskCap">—</span>
    </div>
    <div class="disk-bar"><div class="disk-fill" id="diskFill"></div></div>
    <div class="disk-legend" id="diskLegend"></div>
  </section>

  <section class="hero">
    <div class="total">
      <span class="label">可清理空间</span>
      <span class="num" id="totalNum">—</span>
      <div class="sub" id="totalSub">正在扫描…</div>
    </div>
    <div class="actions">
      <button class="btn" id="btnScan">重新扫描</button>
      <button class="btn primary" id="btnClean" disabled>开始清理</button>
    </div>
  </section>

  <div class="notice" id="notice">
    <span>⚠</span><span>未以管理员身份运行，部分系统目录可能无法清理。右键“以管理员身份运行”可清理更多。</span>
  </div>

  <div class="list-head">
    <label><input type="checkbox" id="chkAll">全选</label>
    <span style="font-size:12px;color:var(--faint)">大小</span>
  </div>
  <main id="list" aria-busy="false"></main>

  <footer id="status">正在初始化…</footer>

  <div class="overlay" id="overlay">
    <div class="dialog" role="alertdialog" aria-labelledby="dlgTitle">
      <h2 id="dlgTitle">确认清理</h2>
      <p id="dlgBody"></p>
      <div class="big" id="dlgSize"></div>
      <p>已删除的文件无法恢复（含清空回收站）。占用中的文件会自动跳过。</p>
      <div class="btns">
        <button class="btn" id="btnCancel">取消</button>
        <button class="btn primary" id="btnConfirm">确认清理</button>
      </div>
    </div>
  </div>

<script>
const invoke = window.__TAURI__.core.invoke;
const appWindow = window.__TAURI__.window.getCurrentWindow();
const $ = (s) => document.querySelector(s);

// 分类图标（内联 SVG，随文字颜色）
const I = {
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2m1 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6"/></svg>',
  clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18 15 15 0 0 1 0-18z"/></svg>',
  image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>',
  chip: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></svg>',
  alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l4-4m-4 4l-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>',
  box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8"/></svg>',
  bolt: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"/></svg>',
  file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM14 2v6h6M9 13h6M9 17h6"/></svg>',
  moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  type: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5h16v2M9 20h6M12 5v15"/></svg>',
  apps: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  hdd: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M2 12h20M6.5 12.01h.01"/></svg>',
};
const ICON_OF = {
  recycle: I.trash, "user-temp": I.clock, "win-temp": I.clock, "browser-cache": I.globe,
  "app-cache": I.apps, "thumb-cache": I.image, "font-cache": I.type, "dx-cache": I.chip,
  "crash-dumps": I.alert, wer: I.alert, "do-cache": I.download, "pkg-cache": I.box,
  "update-cache": I.download, prefetch: I.bolt, "sys-logs": I.file,
  pagefile: I.hdd, hibernate: I.moon, "windows-old": I.box, winsxs: I.chip,
};

const LEVELS = {
  safe: { t: "可安全清理", c: "safe" },
  redownload: { t: "可重新下载", c: "redl" },
  caution: { t: "谨慎", c: "caution" },
};

let targets = [];
// 运行时状态：id -> { total, entries:[{path,size,checked}], expanded, checked(仅不可展开项) }
const st = {};
let busy = false;

function fmt(b) {
  if (!b) return "0 B";
  const u = ["B", "KB", "MB", "GB", "TB"];
  let i = 0, v = b;
  while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
  return (i === 0 ? v : v.toFixed(1)) + " " + u[i];
}
function fmtBig(b) {
  const s = fmt(b), sp = s.lastIndexOf(" ");
  return `${s.slice(0, sp)}<span class="u">${s.slice(sp + 1)}</span>`;
}
function status(msg) { $("#status").textContent = msg; }
function itemEl(id) { return document.querySelector(`.item[data-id="${id}"]`); }
const meta = (id) => targets.find(t => t.id === id);
// 缩短路径：常见前缀换成占位符，突出应用/目录名
function shortPath(p) {
  return p
    .replace(/^C:\\Users\\[^\\]+\\AppData\\Local/i, "%LocalAppData%")
    .replace(/^C:\\Users\\[^\\]+\\AppData\\Roaming/i, "%AppData%")
    .replace(/^C:\\Users\\[^\\]+/i, "%用户%")
    .replace(/^C:\\Windows/i, "%Windows%");
}

// ── 选择/合计 ──────────────────────────────
function selectedSize(t) {   // 计入合计的大小（opens_settings 不计）
  const s = st[t.id];
  if (t.expandable) return s.entries.filter(e => e.checked).reduce((a, e) => a + e.size, 0);
  return (s.checked && !t.opens_settings) ? (s.total || 0) : 0;
}
function isSelected(t) {      // 是否被选中（用于计数/清理，含 opens_settings）
  const s = st[t.id];
  return t.expandable ? s.entries.some(e => e.checked) : s.checked;
}
function parentState(t) {     // off / on / mixed
  const s = st[t.id];
  if (!t.expandable) return s.checked ? "on" : "off";
  const n = s.entries.length, k = s.entries.filter(e => e.checked).length;
  return k === 0 ? "off" : k === n ? "on" : "mixed";
}

function render() {
  const list = $("#list");
  list.innerHTML = "";
  let advShown = false;
  targets.forEach((t, i) => {
    if (t.advanced && !advShown) {
      advShown = true;
      list.insertAdjacentHTML("beforeend",
        `<div class="group-head">系统深度清理<span class="tag">需管理员</span></div>`);
    }
    const lvl = LEVELS[t.level] || LEVELS.safe;
    const item = document.createElement("div");
    item.className = "item";
    item.dataset.id = t.id;
    item.style.animationDelay = (i * 22) + "ms";
    item.innerHTML =
      `<div class="row">
         ${t.expandable ? '<button class="chevron" title="展开查看具体内容" aria-label="展开">▶</button>' : '<span class="chevron-sp"></span>'}
         <input type="checkbox" class="pchk" aria-label="${t.name}">
         <div class="icon">${ICON_OF[t.id] || I.file}</div>
         <div class="info">
           <div class="name">${t.name}<span class="lvl ${lvl.c}">${lvl.t}</span></div>
           <div class="desc">${t.desc}</div>
         </div>
         <div class="size">—</div>
       </div>
       <div class="sub" hidden></div>`;
    list.appendChild(item);

    const pchk = item.querySelector(".pchk");
    pchk.checked = t.default_on;
    pchk.addEventListener("change", () => setParent(t, pchk.checked));
    if (t.expandable) item.querySelector(".chevron").addEventListener("click", () => toggleExpand(t));
  });
}

function setParent(t, on) {
  const s = st[t.id];
  if (t.expandable) s.entries.forEach(e => e.checked = on);
  else s.checked = on;
  if (s.expanded) renderSub(t);
  syncItem(t);
  updateTotal();
}

function toggleExpand(t) {
  const s = st[t.id];
  s.expanded = !s.expanded;
  renderSub(t);
}

function renderSub(t) {
  const item = itemEl(t.id);
  const sub = item.querySelector(".sub");
  const ch = item.querySelector(".chevron");
  const s = st[t.id];
  if (!s.expanded) { sub.hidden = true; if (ch) ch.classList.remove("open"); return; }
  if (ch) ch.classList.add("open");
  if (!s.entries.length) {
    sub.innerHTML = `<div class="subempty">未发现可清理内容</div>`;
  } else {
    sub.innerHTML = s.entries.map((e, idx) =>
      `<label class="subrow">
         <input type="checkbox" data-idx="${idx}" ${e.checked ? "checked" : ""}>
         <span class="subpath" title="${e.path}">${shortPath(e.path)}</span>
         <span class="subsize">${fmt(e.size)}</span>
       </label>`).join("");
    sub.querySelectorAll("input").forEach(inp => {
      inp.addEventListener("change", () => {
        s.entries[+inp.dataset.idx].checked = inp.checked;
        syncItem(t);
        updateTotal();
      });
    });
  }
  sub.hidden = false;
}

function syncItem(t) {          // 同步父复选框的勾选/半选态
  const pchk = itemEl(t.id).querySelector(".pchk");
  const ps = parentState(t);
  pchk.checked = ps === "on";
  pchk.indeterminate = ps === "mixed";
}

async function refreshDisk() {
  try {
    const d = await invoke("disk_info");
    if (!d.total) return;
    const used = d.total - d.free;
    const pct = Math.round(used / d.total * 100);
    $("#diskCap").textContent = `${fmt(used)} / ${fmt(d.total)}`;
    const fill = $("#diskFill");
    fill.style.width = pct + "%";
    fill.className = "disk-fill" + (pct >= 92 ? " crit" : pct >= 80 ? " warn" : "");
    $("#diskLegend").textContent = `已用 ${pct}% · 可用 ${fmt(d.free)}`;
  } catch {}
}

let totalShown = 0, totalRaf = null;
function animateTotal(to) {
  if (totalRaf) cancelAnimationFrame(totalRaf);
  const from = totalShown, start = performance.now();
  const step = (now) => {
    const p = Math.min((now - start) / 400, 1);
    totalShown = from + (to - from) * (1 - Math.pow(1 - p, 3));
    $("#totalNum").innerHTML = fmtBig(Math.round(totalShown));
    if (p < 1) { totalRaf = requestAnimationFrame(step); }
    else { totalShown = to; totalRaf = null; }
  };
  totalRaf = requestAnimationFrame(step);
}

function updateTotal() {
  animateTotal(targets.reduce((a, t) => a + selectedSize(t), 0));
  const selCount = targets.filter(isSelected).length;
  $("#totalSub").textContent = `共 ${targets.length} 项，已选 ${selCount} 项`;
  $("#btnClean").disabled = busy || selCount === 0;
  const allOn = targets.every(t => parentState(t) === "on");
  const noneOn = targets.every(t => parentState(t) === "off");
  const chkAll = $("#chkAll");
  chkAll.checked = allOn;
  chkAll.indeterminate = !allOn && !noneOn;
}

function setBusy(b) {
  $("#btnScan").disabled = b;
  $("#btnClean").disabled = b || targets.filter(isSelected).length === 0;
  $("#list").setAttribute("aria-busy", b);
}

async function scanAll() {
  if (busy) return;
  busy = true; setBusy(true);
  status("正在扫描…");
  await Promise.all(targets.map(async (t) => {
    const item = itemEl(t.id);
    const el = item.querySelector(".size");
    item.querySelector(".row").classList.add("scanning");
    el.textContent = "···";
    try {
      const r = await invoke("scan_target", { id: t.id });
      const s = st[t.id];
      s.total = r.total;
      // 每条默认按父项 default_on 勾选
      s.entries = r.entries.map(e => ({ path: e.path, size: e.size, checked: t.default_on }));
      el.textContent = (r.total === 0 && t.advanced) ? "—" : fmt(r.total);
      el.classList.toggle("zero", r.total === 0);
      if (s.expanded) renderSub(t);
      syncItem(t);
    } catch {
      el.textContent = "—";
    } finally {
      item.querySelector(".row").classList.remove("scanning");
      updateTotal();
    }
  }));
  busy = false; setBusy(false); updateTotal();
  status(`扫描完成 · 可清理 ${fmt(targets.reduce((a, t) => a + selectedSize(t), 0))}`);
}

async function cleanSelected() {
  const chosen = targets.filter(isSelected);
  if (!chosen.length || busy) return;
  // 先置 busy 再弹窗：确认期间禁用按钮，堵住键盘触发的并发操作
  busy = true; setBusy(true);
  const total = targets.reduce((a, t) => a + selectedSize(t), 0);
  $("#dlgBody").textContent = `将处理 ${chosen.length} 个项目，预计释放：`;
  $("#dlgSize").innerHTML = fmtBig(total);
  $("#overlay").classList.add("show");
  $("#btnConfirm").focus();

  const ok = await new Promise((res) => {
    $("#btnConfirm").onclick = () => res(true);
    $("#btnCancel").onclick = () => res(false);
    $("#overlay").onclick = (e) => { if (e.target === $("#overlay")) res(false); };
  });
  $("#overlay").classList.remove("show");
  if (!ok) { busy = false; setBusy(false); return; }

  let freed = 0;
  for (const t of chosen) {
    const item = itemEl(t.id);
    const el = item.querySelector(".size");
    item.querySelector(".row").classList.add("cleaning");
    status(`正在清理：${t.name} …`);
    try {
      // 可展开项只清理勾选的路径；其他项传 null（清全部/执行命令）
      const paths = t.expandable ? st[t.id].entries.filter(e => e.checked).map(e => e.path) : null;
      const res = await invoke("clean_target", { id: t.id, paths });
      if (t.opens_settings) {
        el.innerHTML = res.errors > 0
          ? `<span>${fmt(st[t.id].total || 0)}</span><span class="err">打开失败</span>`
          : `<span>${fmt(st[t.id].total || 0)}</span><span class="freed">已打开设置</span>`;
        continue;
      }
      freed += res.freed;
      // 重扫该项，刷新剩余
      const r = await invoke("scan_target", { id: t.id });
      const s = st[t.id];
      s.total = r.total;
      s.entries = r.entries.map(e => ({ path: e.path, size: e.size, checked: false }));
      let html = `<span>${fmt(r.total)}</span><span class="freed">已清 ${fmt(res.freed)}</span>`;
      if (res.errors > 0) html += `<span class="err">跳过 ${res.errors} 个占用</span>`;
      el.innerHTML = html;
      el.classList.toggle("zero", r.total === 0);
      if (s.expanded) renderSub(t);
      syncItem(t);
    } catch (e) {
      el.innerHTML = `<span class="err">失败</span>`;
    } finally {
      item.querySelector(".row").classList.remove("cleaning");
    }
  }
  busy = false; setBusy(false); updateTotal();
  refreshDisk();
  status(`清理完成 · 本次释放 ${fmt(freed)}`);
}

// 窗口控制
$("#btnMin").onclick = () => appWindow.minimize();
$("#btnClose").onclick = () => appWindow.close();
$("#btnScan").addEventListener("click", scanAll);
$("#btnClean").addEventListener("click", cleanSelected);
$("#chkAll").addEventListener("change", (e) => {
  targets.forEach(t => {
    const s = st[t.id];
    if (t.expandable) s.entries.forEach(en => en.checked = e.target.checked);
    else s.checked = e.target.checked;
    if (s.expanded) renderSub(t);
    syncItem(t);
  });
  updateTotal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && $("#overlay").classList.contains("show")) $("#btnCancel").click();
});

(async function init() {
  targets = await invoke("list_targets");
  targets.forEach(t => st[t.id] = { total: 0, entries: [], expanded: false, checked: t.default_on });
  if (!(await invoke("is_admin"))) $("#notice").classList.add("show");
  render();
  refreshDisk();
  scanAll();
})();
</script>
</body>
</html>
